stages:
  - lint
  - test
  - build
  - deploy

lint:
  stage: lint
  image: python:3.12-slim
  script:
    - pip install --no-cache-dir ruff
    # ruff's default exit code is non-zero on any violation, which fails the job
    # (and pipeline) on lint errors — no --exit-zero or suppression here.
    - ruff check mcp_server/ agent/ api/ audit/ ml/ rag/

test:
  stage: test
  image: python:3.12-slim
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    HF_HOME: "$CI_PROJECT_DIR/.cache/huggingface"
    PYTHONPATH: "${CI_PROJECT_DIR}"
  cache:
    key: test-deps-v1
    paths:
      - .cache/pip
      - .cache/huggingface
  before_script:
    # faiss-cpu/xgboost/torch all need libgomp (OpenMP) at import time.
    - apt-get update && apt-get install -y --no-install-recommends libgomp1 && rm -rf /var/lib/apt/lists/*
    # The default PyPI `torch` wheel on Linux is CUDA-enabled and drags in several GB
    # of nvidia-*/triton packages a CI runner never needs. Installing CPU-only torch
    # first (same trick as the Dockerfile) satisfies sentence-transformers' unpinned
    # `torch` dependency before pip ever reaches for the CUDA build.
    - pip install --no-cache-dir --default-timeout=120 --retries 5 torch --index-url https://download.pytorch.org/whl/cpu
    - pip install --no-cache-dir --default-timeout=120 --retries 5 -r requirements.txt
  script:
    - python -m pytest tests/ -v

build-and-push:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    # Push straight from the local dind daemon — no docker save/artifact/load hop.
    # The 4.27GB image exceeded GitLab.com's free-tier artifact upload limit
    # (413 Request Entity Too Large), which was the whole reason for the artifact
    # hand-off between separate build/push jobs in the first place.
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"

deploy:
  stage: deploy
  image: alpine:3.20
  needs:
    - build-and-push
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache openssh-client curl
  script:
    - SSH_KEY_FILE="$EC2_SSH_PRIVATE_KEY"
    - chmod 600 "$SSH_KEY_FILE"
    # StrictHostKeyChecking=no (plus discarding known_hosts) skips host-key
    # verification entirely — a real MITM exposure in general. We accept it here
    # because this ephemeral runner has no pre-seeded known_hosts to check against
    # anyway, and it's always connecting to the one known EC2 host for this project;
    # the alternative (pinning the host key some other way) isn't worth it for a
    # single-host deploy target.
    - |
      ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
          -i "$SSH_KEY_FILE" "ubuntu@${EC2_HOST}" bash -s <<EOF
      set -e
      docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
      docker pull "$CI_REGISTRY_IMAGE:latest"
      docker stop loan-underwriting-copilot || true
      docker rm loan-underwriting-copilot || true
      docker run -d --name loan-underwriting-copilot -p 8000:8000 \
        -e GROQ_API_KEY="$GROQ_API_KEY" --restart unless-stopped \
        "$CI_REGISTRY_IMAGE:latest"
      EOF
    - |
      for i in 1 2 3 4 5 6; do
        if curl -sf "http://${EC2_HOST}:8000/health"; then
          echo "Deployment healthy."
          exit 0
        fi
        echo "Health check attempt $i failed, retrying in 5s..."
        sleep 5
      done
      echo "Deployment did not become healthy within 30s."
      exit 1
